{% extends 'core/base.html' %}
{% load static %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">
        
        <div class="text-center mb-4">
            <img src="{% static 'img/logo_clube.png' %}" alt="Logo do Clube" class="img-fluid mb-3" style="max-height: 110px; object-fit: contain;">
            <h4 class="fw-bold text-dark mt-2">Acesso ao Sistema</h4>
        </div>

        <div class="card shadow-sm border-0" style="border-radius: 16px;">
            <div class="card-body p-4 p-md-5">
                <form method="post">
                    {% csrf_token %}
                    
                    {% if form.errors %}
                    <div class="alert alert-danger small p-2 text-center rounded-3">
                        <i class="fas fa-exclamation-circle me-1"></i> Usuário ou senha incorretos.
                    </div>
                    {% endif %}

                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted ms-1">Usuário</label>
                        <input type="text" name="username" class="form-control form-control-lg bg-light border-0 rounded-3 px-3" placeholder="Digite seu usuário" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold text-muted ms-1">Senha</label>
                        <input type="password" name="password" class="form-control form-control-lg bg-light border-0 rounded-3 px-3" placeholder="Digite sua senha" required>
                    </div>

                    <div class="d-grid mt-2">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold rounded-3 py-2 shadow-sm" style="background-color: #0d47a1; border: none;">
                            Entrar
                        </button>
                    </div>
                </form>
            </div>
        </div>
        
        <div class="text-center mt-4 opacity-75">
            <p class="small text-muted mb-0">Esqueceu a senha?</p>
            <p class="small text-muted">Procure a diretoria do clube.</p>
        </div>

    </div>
</div>
{% endblock %}
