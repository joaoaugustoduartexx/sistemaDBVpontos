{% extends 'core/base.html' %}
{% block content %}
<div class="container mt-4" style="max-width: 500px;">
    <div class="card shadow border-0">
        <div class="card-header bg-primary text-white py-3 text-center">
            <h5 class="mb-0 fw-bold"><i class="fas fa-key me-2"></i>Alterar Minha Senha</h5>
        </div>
        <div class="card-body p-4">
            <form method="POST">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-bold small">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mt-2">
                    SALVAR NOVA SENHA
                </button>
                <a href="{% url 'dashboard' %}" class="btn btn-light w-100 mt-2 border">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
